version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo:
        patterns: ["*"]
    ignore:
      # These crates define the on-disk format or SQL parsing; a breaking bump
      # needs a deliberate migration (and data-format review), not an automated
      # PR. bincode 2/3 also break the serialize/deserialize API we use
      # (bincode 3.0.0 is an intentionally non-compiling protest release).
      - dependency-name: "bincode"
        update-types: ["version-update:semver-major"]
      - dependency-name: "redb"
        update-types: ["version-update:semver-major"]
      - dependency-name: "sqlparser"
        update-types:
          ["version-update:semver-major", "version-update:semver-minor"]
      # SIMD API is pinned (f32x8 kernels); 0.7 -> 1.x is a breaking bump.
      - dependency-name: "wide"
        update-types:
          ["version-update:semver-major", "version-update:semver-minor"]
      # tokio-rustls is consumed by the first-party wire crate (elyra-wire); a
      # minor/major bump changes the rustls API and needs deliberate review.
      - dependency-name: "tokio-rustls"
        update-types:
          ["version-update:semver-major", "version-update:semver-minor"]
      # nom and mysql_common are used by the vendored wire protocol (elyra-wire,
      # forked from opensrv-mysql). nom 8 and mysql_common 0.33+ change APIs the
      # vendored code relies on; upgrading needs a deliberate port of that code.
      - dependency-name: "nom"
        update-types:
          ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "mysql_common"
        update-types:
          ["version-update:semver-major", "version-update:semver-minor"]
      # sha1 0.11 pulls the breaking digest 0.11 API used in the (security-
      # critical) password-hashing path; migrating needs deliberate code changes.
      - dependency-name: "sha1"
        update-types:
          ["version-update:semver-major", "version-update:semver-minor"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
