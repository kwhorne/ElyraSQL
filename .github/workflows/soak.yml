name: Soak / chaos

# Long-running soak + crash-consistency tests. Many concurrent connections run
# atomic transfers while a chaos loop repeatedly SIGKILLs and restarts the
# server; a global bank invariant (balance conserved, never negative) is checked
# continuously and after every crash. Short versions of these tests run per-PR in
# the normal suite; this job runs them much longer to shake out rare races.

on:
  schedule:
    - cron: "0 3 * * *" # nightly 03:00 UTC
  workflow_dispatch:
    inputs:
      secs:
        description: "Soak duration (seconds)"
        default: "300"
      workers:
        description: "Concurrent workers"
        default: "16"

env:
  CARGO_TERM_COLOR: always

jobs:
  soak:
    name: soak + chaos
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: CPU info
        run: echo "cores: $(nproc)"; free -h | head -2

      - name: Build
        run: cargo build --release -p elyra-cli

      - name: Soak + chaos
        env:
          ELYRASQL_SOAK_SECS: ${{ github.event.inputs.secs || '300' }}
          ELYRASQL_SOAK_WORKERS: ${{ github.event.inputs.workers || '16' }}
          ELYRASQL_SOAK_ACCOUNTS: "32"
          ELYRASQL_SOAK_KILL_MS: "2000"
        run: cargo test -p elyra-cli --release --test soak -- --nocapture --test-threads=1
