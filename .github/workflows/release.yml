name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            arch: x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            arch: aarch64
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build static binary
        run: cargo build --release --locked --target ${{ matrix.target }} -p elyra-cli

      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          NAME=elyrasql-${VERSION}-linux-${{ matrix.arch }}
          mkdir -p "dist/$NAME"
          cp target/${{ matrix.target }}/release/elyrasql "dist/$NAME/"
          cp README.md LICENSE "dist/$NAME/"
          cp packaging/elyrasql.service "dist/$NAME/"
          tar -C dist -czf "$NAME.tar.gz" "$NAME"
          sha256sum "$NAME.tar.gz" > "$NAME.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.arch }}
          path: |
            elyrasql-*.tar.gz
            elyrasql-*.tar.gz.sha256

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/elyrasql-*.tar.gz
            artifacts/elyrasql-*.tar.gz.sha256
          generate_release_notes: true
