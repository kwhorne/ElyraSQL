name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: build & test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features

      - name: Build
        run: cargo build --workspace --verbose

      - name: Test
        run: cargo test --workspace --verbose

  smoke:
    name: end-to-end smoke test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release -p elyra-cli

      - name: Start server and run queries
        run: |
          ./target/release/elyrasql serve --data /tmp/ci.edb --listen 127.0.0.1:3307 &
          SERVER_PID=$!
          sleep 2
          python3 -m pip install --quiet PyMySQL
          python3 - <<'PY'
          import pymysql
          c = pymysql.connect(host="127.0.0.1", port=3307, user="root", password="", autocommit=True)
          cur = c.cursor()
          cur.execute("CREATE TABLE t (id BIGINT PRIMARY KEY, name TEXT, ts DATETIME)")
          cur.execute("INSERT INTO t VALUES (1,'a','2024-01-01 00:00:00'),(2,'b','2024-06-01 12:00:00')")
          cur.execute("SELECT COUNT(*) FROM t")
          assert cur.fetchone()[0] == 2, "row count"
          cur.execute("SELECT name FROM t WHERE id = 2")
          assert cur.fetchone()[0] == "b", "pk lookup"
          cur.execute("BEGIN")
          cur.execute("INSERT INTO t VALUES (3,'c','2024-01-01 00:00:00')")
          cur.execute("ROLLBACK")
          cur.execute("SELECT COUNT(*) FROM t")
          assert cur.fetchone()[0] == 2, "rollback"
          print("smoke test passed")
          c.close()
          PY
          kill $SERVER_PID
