name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: build & test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features

      - name: Build
        run: cargo build --workspace --verbose

      - name: Test
        run: cargo test --workspace --verbose

  audit:
    name: security audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      # Honours .cargo/audit.toml, where each ignored advisory is documented
      # with a reachability/format rationale.
      - name: Audit dependencies
        run: cargo audit

  compatibility:
    name: client & framework compatibility
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release -p elyra-cli

      - name: Start ElyraSQL server
        run: |
          ./target/release/elyrasql serve --data /tmp/ci.edb --listen 127.0.0.1:3307 &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          # wait for the port to accept connections
          for i in $(seq 1 100); do
            (echo > /dev/tcp/127.0.0.1/3307) >/dev/null 2>&1 && break
            sleep 0.2
          done

      - name: PyMySQL smoke (pure-Python driver, client-side binding)
        run: |
          python3 -m pip install --quiet PyMySQL
          ELYRASQL_PORT=3307 python3 tests/compat/python/pymysql_smoke.py

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_mysql
          tools: composer

      - name: Laravel / Eloquent compatibility (PDO)
        working-directory: tests/compat/laravel
        run: |
          composer install --no-interaction --no-progress
          ELYRASQL_PORT=3307 ELYRASQL_DB=elyra php eloquent_test.php

      - name: Stop server
        if: always()
        run: kill "$SERVER_PID" || true
