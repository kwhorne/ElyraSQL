# cargo-audit configuration for ElyraSQL.
#
# Each ignored advisory below is a deliberate, reviewed decision -- not a blanket
# mute. Re-review whenever `opensrv-mysql` publishes a release that upgrades its
# rustls stack, or whenever the bincode on-disk format is revisited.

[advisories]
ignore = [
    # NOTE: the four rustls-webpki 0.102 advisories are gone -- forking the wire
    # layer (elyra-wire) let us move the server TLS stack to rustls 0.23 +
    # rustls-webpki 0.103.13, so they no longer apply and are not ignored here.

    # --- Unmaintained (warnings, no known vulnerability) ---
    # bincode 1.3.3 defines our on-disk row/catalog encoding. bincode 2/3 change
    # the serialize/deserialize API and byte layout (3.0.0 is an intentionally
    # non-compiling protest release); a bump is a deliberate data-format
    # migration, not a routine update.
    "RUSTSEC-2025-0141", # bincode unmaintained
    # Transitive via a proc-macro dependency; build-time only, not shipped.
    "RUSTSEC-2026-0173", # proc-macro-error2 unmaintained
    # Transitive via tokio-rustls 0.25; leaves with the rustls 0.23 upgrade.
    "RUSTSEC-2025-0134", # rustls-pemfile unmaintained
]
